# Xenium skin batch7: obsm spatial (2 cols), layer imputed_count, obs cell_type_int (~30k cells).
# spacetravlr -c spaceship_config.xenium_skin_batch7.toml --plain

[data]
adata_path      = "/ix/djishnu/shared/djishnu_kor11/training_data_revision/xenium_skin_batch7.h5ad"
layer           = "imputed_count"
cluster_annot   = "cell_type_int"

[spatial]
radius           = 200
spatial_dim      = 32
contact_distance = 50

[grn]
tf_ligand_cutoff = 0.15

[cnn]
adam_beta_1 = 0.9
adam_beta_2 = 0.999
adam_epsilon = 1e-5
spatial_feature_radius = 200.0

[lasso]
l1_reg    = 1e-9
group_reg = 1e-9
n_iter    = 100
tol       = 1e-4

[training]
# seed: fast startup, no O(n²) kNN over all cells. Use hybrid only if you accept a long Moran kNN pre-pass.
mode            = "seed"
epochs          = 10
learning_rate   = 2e-4
score_threshold = 0.1

[training.hybrid]
min_cells_per_cluster_for_cnn = 80
max_modulators_soft_for_cnn = 256
moran_k_neighbors = 8
moran_permutations = 99
moran_p_value_max = 0.05
moran_p_value_max_when_over_modulator_cap = 0.01
require_all_clusters_lasso_converged = true
hybrid_modulator_spatial_weight = 1.0
hybrid_cnn_permissiveness = 1

[execution]
n_parallel  = 100
output_dir  = "/ix/djishnu/shared/djishnu_kor11/training_data_revision/xenium_skin_batch7_spacetravlr_out"

[perturbation]
beta_scale_factor = 1.0
n_propagation     = 4
ligand_grid_factor = 0.5

[model_export]
save_cnn_weights = true
compressed_npz = true
output_subdir = "saved_models"
