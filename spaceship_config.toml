# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  SpaceTravLR — Spaceship Config                                            ║
# ║  All training hyperparameters in one place.                                ║
# ║  CLI flags (--epochs, --parallel, etc.) override values here.              ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

[data]
# Path to .h5ad dataset. Leave empty for interactive prompt (TUI) or pass --h5ad.
# adata_path      = "/Users/koush/Projects/jishnulab/SpaceTravLR/tutorial/ThePerturbedBrain/slideseq_brain_processed.h5ad"
# Expression layer to read from AnnData
layer           = "imputed_count"
# obs column holding integer cluster labels
cluster_annot   = "cell_type_int"

[spatial]
# Radius for spatial neighbor detection
radius           = 200
# Grid resolution for spatial convolution kernel
spatial_dim      = 32
# Distance threshold for contact-based signaling
contact_distance = 50

[grn]
# Optional: directory with mouse_network.parquet / human_network.parquet (overrides SPACETRAVLR_DATA_DIR).
# network_data_dir = "/path/to/your/data"
# Optional: Feather/IPC TF priors with columns: source, target, cell_type.
# tf_priors_feather = "/Users/koush/Projects/jishnulab/SpaceTravLR/tutorial/SlideTagsKidney/xenium_skin_links.feather"
# Minimum score for a TF to be included as a ligand-mediated regulator
tf_ligand_cutoff = 0.15
# Cap LR pairs in database order when NOT using expression ranking (omit = no limit)
# max_lr_pairs = 50
# Keep only the top K LR pairs by mean expression: score = 0.5 * (mean_ligand + mean_receptor)
# across all cells, using [data].layer. When set, max_lr_pairs is ignored.
# top_lr_pairs_by_mean_expression = 100
# Subset modulator groups (default all true). Set false to ablate TF / LR / TF–ligand (NicheNet) features.
# use_tf_modulators = true
# use_lr_modulators = true
# use_tfl_modulators = true

[cnn]
# Adam hyperparameters (CNN fine-tuning when seed_only = false)
adam_beta_1 = 0.9
adam_beta_2 = 0.999
adam_epsilon = 1e-5
# L2 weight decay on CNN params (omit or comment out for none)
# weight_decay = 1e-4
# Clip gradient L2 norm (omit for no clipping)
# grad_clip_norm = 1.0
# Radius passed to create_spatial_features for CNN inputs (coordinate units)
spatial_feature_radius = 200.0

[lasso]
# Element-wise L1 penalty
l1_reg    = 1e-9
# Group-L2 penalty
group_reg = 1e-9
# Max FISTA iterations
n_iter    = 100
# Relative convergence tolerance
tol       = 1e-4

[training]
# Default when omitted: seed. Use full or hybrid to enable CNN paths.
mode            = "seed"
epochs          = 10
# Learning rate for CNN Adam (see [cnn] for beta/epsilon/decay/clip)
learning_rate   = 2e-4
# Minimum mean lasso R² to allow CNN in hybrid mode (also used when hybrid.min_mean_lasso_r2_for_cnn is unset)
score_threshold = 0.1

# Hybrid gating (only when mode = "hybrid"); see src/cnn_gating.rs / log gate_* fields
[training.hybrid]
min_cells_per_cluster_for_cnn = 80
max_modulators_soft_for_cnn = 600
moran_k_neighbors = 8
moran_permutations = 99
moran_p_value_max = 0.05
moran_p_value_max_when_over_modulator_cap = 0.01
require_all_clusters_lasso_converged = true
# min_mean_lasso_r2_for_cnn = 0.15
# min_mean_target_expression_for_cnn = 0.01
hybrid_modulator_spatial_weight = 1.0
# 0 = stricter gates (fewer CNNs), 1 = looser; 0.5 matches pre-knob behavior (default if omitted)
hybrid_cnn_permissiveness = 1
# cnn_force_genes_file = "path/to/allow.txt"
# cnn_skip_genes_file = "path/to/skip.txt"
# hybrid_cnn_top_k = 50

[execution]
# Number of parallel gene-training workers
n_parallel  = 9
# Directory for *_betadata.feather. Leave empty to use cwd/{adata_stem}_YYYY-MM-DD (local date).
# output_dir = "/path/to/custom_run"
# Write spacetravlr_minimal_repro.h5ad (slow / large I/O on big datasets). Default false; or pass --write-minimal-repro-h5ad.
# write_minimal_repro_h5ad = true

[perturbation]
# Multiplier applied to all betas in splash()
beta_scale_factor = 1.0
# Clamp betas to [-cap, cap] after scaling (comment out or omit for no cap)
# beta_cap        = 10.0
# Number of signal propagation rounds
n_propagation     = 4
# Approximate received ligands using a spatial grid for faster perturbation.
# Value is grid_spacing / radius (smaller = more accurate, larger = faster).
#   0.5 → ~3% error, ~12x faster at 5000+ cells
#   0.3 → ~1% error, ~6x faster
# Comment out or omit for exact O(N²) computation.
ligand_grid_factor = 0.5

[model_export]
# Export CNN weights (.npz) for genes that run per-cell CNN refinement (omit or false = off).
save_cnn_weights = false
# Use compressed .npz (numpy savez_compressed format).
compressed_npz = true
# Subdirectory under [execution].output_dir (currently fixed to "saved_models")
output_subdir = "saved_models"
