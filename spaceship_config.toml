# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  SpaceTravLR — Spaceship Config                                            ║
# ║  All training hyperparameters in one place.                                ║
# ║  CLI flags (--epochs, --parallel, etc.) override values here.              ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

[data]
# Path to .h5ad dataset.  Leave empty to use $SPACETRAVLR_H5AD env var.
# adata_path      = "/Users/koush/Projects/jishnulab/SpaceTravLR/tutorial/ThePerturbedBrain/slideseq_brain_processed.h5ad"
# Expression layer to read from AnnData
layer           = "imputed_count"
# obs column holding integer cluster labels
cluster_annot   = "cell_type_int"

[spatial]
# Radius for spatial neighbor detection
radius           = 200
# Grid resolution for spatial convolution kernel
spatial_dim      = 32
# Distance threshold for contact-based signaling
contact_distance = 50

[grn]
# Minimum score for a TF to be included as a ligand-mediated regulator
tf_ligand_cutoff = 0.15
# Cap LR pairs in database order when NOT using expression ranking (omit = no limit)
# max_lr_pairs = 50
# Keep only the top K LR pairs by mean expression: score = 0.5 * (mean_ligand + mean_receptor)
# across all cells, using [data].layer. When set, max_lr_pairs is ignored.
# top_lr_pairs_by_mean_expression = 100

[cnn]
# Adam hyperparameters (CNN fine-tuning when seed_only = false)
adam_beta_1 = 0.9
adam_beta_2 = 0.999
adam_epsilon = 1e-5
# L2 weight decay on CNN params (omit or comment out for none)
# weight_decay = 1e-4
# Clip gradient L2 norm (omit for no clipping)
# grad_clip_norm = 1.0
# Radius passed to create_spatial_features for CNN inputs (coordinate units)
spatial_feature_radius = 100.0

[lasso]
# Element-wise L1 penalty
l1_reg    = 1e-9
# Group-L2 penalty
group_reg = 1e-9
# Max FISTA iterations
n_iter    = 100
# Relative convergence tolerance
tol       = 1e-4

[training]
# true = lasso-only (cluster-level betas), false = lasso + CNN (cell-level betas)
seed_only       = true
# CNN fine-tuning epochs per gene (ignored when seed_only = true)
epochs          = 10
# Learning rate for CNN Adam (see [cnn] for beta/epsilon/decay/clip)
learning_rate   = 2e-4
# Minimum R² to accept a fit (0.0 = keep everything)
score_threshold = 0.1

[execution]
# Number of parallel gene-training workers
n_parallel  = 1
# Directory for *_betadata.csv output files
output_dir  = "/tmp/slideseq_brain"

[perturbation]
# Multiplier applied to all betas in splash()
beta_scale_factor = 1.0
# Clamp betas to [-cap, cap] after scaling (comment out or omit for no cap)
# beta_cap        = 10.0
# Number of signal propagation rounds
n_propagation     = 4
# Approximate received ligands using a spatial grid for faster perturbation.
# Value is grid_spacing / radius (smaller = more accurate, larger = faster).
#   0.5 → ~3% error, ~12x faster at 5000+ cells
#   0.3 → ~1% error, ~6x faster
# Comment out or omit for exact O(N²) computation.
ligand_grid_factor = 0.5
